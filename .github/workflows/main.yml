name: Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0'
  PROJECT_PATH: 'Backend/HuaSect_AMS_DBTCwebapi/HuaSect_AMS_DBTCwebapi.csproj'
  TEST_PROJECT: 'Backend/HuaSect_AMS_DBTCtests/HuaSect_AMS_DBTCtests.csproj'
  DOCKER_IMAGE: ${{ vars.DOCKER_USERNAME }}/huasect-ams-backend

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c Release

      - name: Run tests with coverage
        run: dotnet test ${{ env.TEST_PROJECT }} --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Build Docker image (validate Dockerfile)
        run: docker build -t ${{ env.DOCKER_IMAGE }}:ci-test -f Dockerfile .

      - name: Run container + smoke test
        run: |
          docker run -d -p 8080:8080 --name ci-smoke ${{ env.DOCKER_IMAGE }}:ci-test
          echo "⏳ Waiting for app to start..."
          for i in {1..15}; do
            curl -sf http://localhost:8080/health && break || sleep 3
          done
          docker logs ci-smoke
          docker stop ci-smoke

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Deploy to Staging Server via SSH
        run: |
          echo "🚀 Deploying ${{ env.DOCKER_IMAGE }}:${{ github.sha }} to staging..."
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} << 'EOF'
            set -e
            
            # Pull new image
            docker pull ${{ env.DOCKER_IMAGE }}:staging
            
            # Stop & remove old container (graceful)
            docker stop huasect-ams-staging 2>/dev/null || true
            docker rm huasect-ams-staging 2>/dev/null || true
            
            # Run new container with env vars
            docker run -d \
              --name huasect-ams-staging \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Staging \
              -e ConnectionStrings__DefaultConnection="${{ secrets.STAGING_DB_CONN }}" \
              -e Stripe__ApiKey="${{ secrets.STAGING_STRIPE_KEY }}" \
              -e Jwt__Key="${{ secrets.STAGING_JWT_KEY }}" \
              ${{ env.DOCKER_IMAGE }}:staging
            
            echo "✅ Container started. Waiting for health check..."
            
            # Wait for app to be ready (max 60s)
            for i in {1..20}; do
              if curl -sf http://localhost:8080/health; then
                echo "🎉 Staging deployment successful!"
                exit 0
              fi
              sleep 3
            done
            
            echo "❌ Health check failed. Rolling back..."
            docker logs huasect-ams-staging
            exit 1
          EOF
