name: Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0'
  PROJECT_PATH: 'Backend/HuaSect_AMS_DBTCwebapi/HuaSect_AMS_DBTCwebapi.csproj'
  TEST_PROJECT: 'Backend/HuaSect_AMS_DBTCtests/HuaSect_AMS_DBTCtests.csproj'
  DOCKER_IMAGE: ${{ vars.DOCKER_USERNAME }}/huasect-ams-dbtc
  AZURE_RESOURCE_GROUP: 'huasect-ams-dbtc-rg'
  AZURE_CONTAINER_APP: 'huasect-ams-dbtc-containerapp'
  AZURE_CONTAINER_APP_ENV: 'huasect-ams-dbtc-containerapp-env'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c Release

      - name: Run tests with coverage
        run: dotnet test ${{ env.TEST_PROJECT }} --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Build Docker image (validate Dockerfile)
        run: docker build -t ${{ env.DOCKER_IMAGE }}:ci-test -f Dockerfile .

      - name: Run container + smoke test
        run: |
          docker run -d -p 8080:8080 --name ci-smoke ${{ env.DOCKER_IMAGE }}:ci-test
          echo "Waiting for app to start..."
          for i in {1..15}; do
            curl -sf http://localhost:8080/health && break || sleep 3
          done
          docker logs ci-smoke
          docker stop ci-smoke

      - name: Generate migration script
        run: dotnet ef migrations script --idempotent --output migrations.sql --project ${{ env.PROJECT_PATH }}
      - name: Apply via psql
        run: |
          docker run --rm \
            -e PGPASSWORD=$(echo "${{ secrets.STAGING_DB_CONN }}" | grep -oP 'Password=\K[^;]+') \
            postgres:18 \
            psql -h $(echo "${{ secrets.STAGING_DB_CONN }}" | grep -oP 'Host=\K[^;]+') \
                -U $(echo "${{ secrets.STAGING_DB_CONN }}" | grep -oP 'Username=\K[^;]+') \
                -d $(echo "${{ secrets.STAGING_DB_CONN }}" | grep -oP 'Database=\K[^;]+') \
                -f migrations.sql
          
  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
      
      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \

            echo "Waiting for new revision to be ready..."
            az containerapp revision list \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?properties.active].name" -o tsv | head -1 | xargs -I {} \
              az containerapp revision wait \
                --name ${{ env.AZURE_CONTAINER_APP }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --revision {} \
                --custom "properties.status.readyReplicas>0" \
                --timeout 300
      
      
      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          
          echo "Checking health at https://$FQDN/health"
          for i in {1..10}; do
            if curl -sf "https://$FQDN/health"; then
              echo "Deployment successful!"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          exit 1